<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · ذاكرة الشركة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;text-decoration:none}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 12px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}

  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:180px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 14px;color:var(--txt);font-family:inherit;font-size:14px}
  .toolbar input:focus{outline:none;border-color:var(--mint)}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--txt-soft);padding:9px 14px;border-radius:100px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s}
  .chip.on{background:var(--mint);color:#04130d;border-color:var(--mint)}

  .item{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:9px;cursor:pointer}
  .item-h{display:flex;align-items:center;gap:10px}
  .item-h .ico{font-size:18px}
  .item-h .t{font-weight:800;font-size:14.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-h .meta{font-size:11.5px;color:var(--txt-mute);flex-shrink:0}
  .item-h .kind{font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:100px;background:rgba(16,185,129,.14);color:#6ee7b7;flex-shrink:0}
  .item-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:13.5px;color:var(--txt-soft);line-height:1.85;white-space:pre-wrap}
  .item.open .item-body{display:block}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 40px}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>🧠 ذاكرة الشركة</h1><p>كل تحليل وسؤال وقرار ورفع بيانات — مسجّل ويمكن البحث فيه. نبّاه يستخدم هذه الذاكرة في إجاباته.</p></div>

  <div class="toolbar">
    <input id="q" placeholder="ابحث… (مثال: الرياض، المرتجعات، الأهداف)" oninput="debounceLoad()">
    <span class="chip on" data-k="" onclick="setKind(this)">الكل</span>
    <span class="chip" data-k="analysis" onclick="setKind(this)">🧑‍💼 تحليلات</span>
    <span class="chip" data-k="question" onclick="setKind(this)">💬 أسئلة</span>
    <span class="chip" data-k="upload" onclick="setKind(this)">📂 رفع</span>
    <span class="chip" data-k="goals" onclick="setKind(this)">🎯 أهداف</span>
  </div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ التحميل…</div>
  <div id="error" class="state" style="display:none;color:var(--red)"></div>
  <div id="list"></div>
  <div id="empty" class="state" style="display:none">🧠 الذاكرة فاضية — كل تحليل أو سؤال أو رفع بيانات من الآن راح يُسجَّل هنا تلقائياً.</div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-command-center.html">🎛️ مركز القيادة</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
let KIND="", TIMER=null;
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة"); }
  const d=await r.json().catch(()=>({}));
  const er=new Error(d.detail||"خطأ"); er.status=r.status;
  if(!r.ok) throw er;
  return d;
}
function setKind(el){
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
  el.classList.add("on"); KIND=el.dataset.k; load();
}
function debounceLoad(){ clearTimeout(TIMER); TIMER=setTimeout(load, 350); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
async function load(){
  document.getElementById("error").style.display="none";
  try{
    const q=encodeURIComponent(document.getElementById("q").value.trim());
    const d=await api(`/company/memory?q=${q}&kind=${KIND}`);
    document.getElementById("loading").style.display="none";
    const list=document.getElementById("list");
    if(!d.items.length){
      list.innerHTML=""; document.getElementById("empty").style.display="block"; return;
    }
    document.getElementById("empty").style.display="none";
    list.innerHTML=d.items.map(m=>`
      <div class="item" onclick="this.classList.toggle('open')">
        <div class="item-h">
          <span class="ico">${m.icon}</span>
          <div class="t">${esc(m.title)}</div>
          <span class="kind">${m.kind_label}</span>
          <span class="meta">${m.date}</span>
        </div>
        <div class="item-body">${esc(m.content)}</div>
      </div>`).join("");
  }catch(e){
    document.getElementById("loading").style.display="none";
    const er=document.getElementById("error"); er.style.display="block";
    if(e.status===402) er.innerHTML=`⏳ شركتك قيد التفعيل. <a href="company-dashboard.html" style="color:var(--mint)">رجوع</a>`;
    else er.textContent=e.message;
  }
}
load();
</script>
</body>
</html>
