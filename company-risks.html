<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · محرّك المخاطر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;transition:.18s;text-decoration:none}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 12px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}

  .overall{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:18px;display:flex;align-items:center;gap:20px}
  .gauge{width:110px;height:110px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;position:relative}
  .gauge::after{content:"";position:absolute;inset:11px;background:var(--panel);border-radius:50%}
  .gauge span{position:relative;z-index:1;font-size:32px;font-weight:900}
  .overall .t{font-size:18px;font-weight:800;margin-bottom:3px}
  .overall .s{font-size:13.5px;color:var(--txt-soft)}

  .risk-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:11px;border-right:5px solid}
  .rc-h{display:flex;align-items:center;gap:13px;margin-bottom:10px}
  .rc-h .ico{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
  .rc-h .title{font-weight:800;font-size:16px}
  .rc-h .badge{margin-inline-start:auto;font-size:12px;font-weight:800;padding:4px 12px;border-radius:100px}
  .reasons{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .reason{font-size:13.5px;color:var(--txt-soft);padding-right:14px;position:relative}
  .reason::before{content:"•";position:absolute;right:0;color:var(--txt-mute)}
  .action{font-size:12.5px;color:var(--mint);font-weight:700}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 40px}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-command-center.html">مركز القيادة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>⚠️ محرّك المخاطر</h1><p>تقييم المخاطر الأربع الكبرى: السيولة · فقد العملاء · انخفاض الأرباح · التعثّر التشغيلي</p></div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ تقييم المخاطر…</div>
  <div id="error" class="state" style="display:none;color:var(--red)"></div>

  <div id="content" style="display:none">
    <div class="overall" id="overall"></div>
    <div id="risks"></div>
  </div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-predictions.html">🔮 التنبؤ</a>
    <a class="btn btn-ghost" href="company-board.html">📋 عرض مجلس الإدارة</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة"); }
  const d=await r.json().catch(()=>({}));
  const er=new Error(d.detail||"خطأ"); er.status=r.status;
  if(!r.ok) throw er;
  return d;
}

async function load(){
  try{
    const d=await api("/company/risks");
    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";

    document.getElementById("overall").innerHTML=`
      <div class="gauge" style="background:conic-gradient(${d.overall_color} 0 ${d.overall_risk}%,#16221c ${d.overall_risk}% 100%)">
        <span style="color:${d.overall_color}">${d.overall_risk}</span>
      </div>
      <div>
        <div class="t" style="color:${d.overall_color}">${d.overall_level}</div>
        <div class="s">مؤشّر المخاطرة العام للشركة (٠-١٠٠) — ${d.company.name}</div>
        <div class="s" style="margin-top:4px;color:var(--txt-mute);font-size:12px">${d.generated_at}</div>
      </div>`;

    document.getElementById("risks").innerHTML=d.risks.map(r=>`
      <div class="risk-card" style="border-right-color:${r.color}">
        <div class="rc-h">
          <div class="ico" style="background:${r.color}22;color:${r.color}">${r.icon}</div>
          <div class="title">${r.title}</div>
          <span class="badge" style="background:${r.color}22;color:${r.color}">${r.score}/100 · ${r.level}</span>
        </div>
        <div class="reasons">${r.reasons.map(x=>`<div class="reason">${x}</div>`).join("")}</div>
        <a href="${r.link}" class="action">${r.action} ←</a>
      </div>`).join("");
  }catch(e){
    document.getElementById("loading").style.display="none";
    const er=document.getElementById("error"); er.style.display="block";
    if(e.status===402) er.innerHTML=`⏳ شركتك قيد التفعيل. <a href="company-dashboard.html" style="color:var(--mint)">رجوع</a>`;
    else er.textContent=e.message;
  }
}
load();
</script>
</body>
</html>
