<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · مقارنة الفروع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:1000px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;transition:.18s}
  .btn-mint{background:var(--mint);color:#04130d;padding:11px 18px}.btn-mint:hover{background:var(--mint-deep)}.btn-mint:disabled{opacity:.6}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 12px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
  .panel h2{font-size:15.5px;font-weight:800;margin-bottom:2px}.panel .sub{font-size:12.5px;color:var(--txt-mute);margin-bottom:14px}
  select{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--txt);font-family:inherit;font-size:14.5px}
  select:focus{outline:none;border-color:var(--mint)}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
  .m{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
  .m .ml{font-size:11.5px;color:var(--txt-soft)}.m .mv{font-size:18px;font-weight:900;margin-top:2px}
  .branch-hd{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .ring{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .ring i{width:46px;height:46px;background:var(--panel);border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:17px;font-style:normal}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:right;font-weight:800;color:var(--txt-soft);padding:10px 8px;border-bottom:1px solid var(--line);font-size:12.5px;cursor:pointer;white-space:nowrap}
  th:hover{color:var(--mint)}
  td{padding:11px 8px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .tbl-wrap{overflow-x:auto}
  .lvl{font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:100px;white-space:nowrap}
  .ai-out{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:13px;font-size:14px;line-height:1.85;display:none}
  .ai-out.show{display:block}
  .ai-out h2{font-size:16px;margin:14px 0 6px;color:var(--mint)}.ai-out h3{font-size:14.5px;margin:12px 0 5px}
  .ai-out p{margin:6px 0;color:var(--txt-soft)}.ai-out ul{margin:6px 22px}.ai-out strong{color:var(--txt)}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 40px}
  @media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>🔀 مقارنة الفروع</h1><p>قارن أداء كل فرع، شوف تفاصيله وتاريخه، واطلب تحليلاً ذكياً</p></div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ التحميل…</div>
  <div id="empty" style="display:none"></div>

  <div id="content" style="display:none">
    <!-- جدول المقارنة -->
    <div class="panel">
      <h2>📊 جدول مقارنة الفروع</h2>
      <div class="sub">اضغط على عنوان أي عمود للترتيب</div>
      <div class="tbl-wrap"><table id="cmpTable"></table></div>
    </div>

    <!-- تفاصيل فرع -->
    <div class="panel">
      <h2>🔎 تفاصيل فرع</h2>
      <div class="sub">اختر فرعاً لعرض مؤشراته وتاريخه</div>
      <select id="branchSel" onchange="renderBranch()" style="width:100%;margin-bottom:16px"></select>
      <div id="branchDetail"></div>
    </div>
  </div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-input.html">إدخال بيانات</a>
  </div>
</div>

<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
let BRANCHES=[], histChart=null, sortKey="score", sortDir=-1;
async function api(p,o={}){
  const r=await fetch(p,{...o,headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN,...(o.headers||{})}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة منتهية"); }
  const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||"خطأ"); return d;
}
const fmt=n=>(Math.round(n)||0).toLocaleString("en-US");
function lvl(s){ return s>=70?["ممتاز","#10b981"]:s>=55?["جيد","#f5b301"]:s>=40?["متوسط","#f59e0b"]:["ضعيف","#ef4444"]; }

async function load(){
  let d; try{ d=await api("/company/dashboard"); }
  catch(e){ document.getElementById("loading").innerHTML=`<span style="color:var(--red)">${e.message}</span>`; return; }
  document.getElementById("loading").style.display="none";
  if(!d.has_data){
    document.getElementById("empty").style.display="block";
    document.getElementById("empty").innerHTML=`<div class="panel" style="text-align:center;padding:36px">
      <div style="font-size:40px;margin-bottom:8px">📊</div><div style="font-weight:800;font-size:18px">لا توجد بيانات بعد</div>
      <div style="color:var(--txt-soft);margin:6px 0 16px">أدخل بيانات الفروع ليبدأ التحليل والمقارنة.</div>
      <a class="btn btn-mint" href="company-input.html">إدخال البيانات</a></div>`;
    return;
  }
  BRANCHES=d.branches.filter(b=>b.has_data);
  document.getElementById("content").style.display="block";
  renderTable();
  document.getElementById("branchSel").innerHTML=BRANCHES.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
  renderBranch();
}

function renderTable(){
  const cols=[["name","الفرع"],["sales","المبيعات"],["customers","العملاء"],["avg_invoice","م.الفاتورة"],
    ["margin","الهامش%"],["repeat_rate","التكرار%"],["growth","النمو%"],["score","المؤشر"]];
  const sorted=[...BRANCHES].sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    if(typeof x==="string") return sortDir*x.localeCompare(y,"ar");
    return sortDir*((x||0)-(y||0));
  });
  let html=`<thead><tr>${cols.map(c=>`<th onclick="setSort('${c[0]}')">${c[1]}${sortKey===c[0]?(sortDir<0?" ▼":" ▲"):""}</th>`).join("")}</tr></thead><tbody>`;
  html+=sorted.map(b=>{
    const[lv,col]=lvl(b.score);
    return `<tr>
      <td style="font-weight:700">${b.name}<div style="font-size:11px;color:var(--txt-mute)">${b.city||"—"}</div></td>
      <td>${fmt(b.sales)}</td><td>${fmt(b.customers)}</td><td>${fmt(b.avg_invoice)}</td>
      <td>${b.margin}%</td><td>${b.repeat_rate}%</td>
      <td style="color:${b.growth>=0?'var(--mint)':'var(--red)'}">${b.growth}%</td>
      <td><span class="lvl" style="background:${col}22;color:${col}">${b.score} · ${lv}</span></td>
    </tr>`;
  }).join("");
  document.getElementById("cmpTable").innerHTML=html+"</tbody>";
}
function setSort(k){ if(sortKey===k) sortDir*=-1; else{ sortKey=k; sortDir=-1; } renderTable(); }

function renderBranch(){
  const id=+document.getElementById("branchSel").value;
  const b=BRANCHES.find(x=>x.id===id); if(!b) return;
  const[lv,col]=lvl(b.score);
  const prods=(b.top_products||"").split("|").map(x=>x.trim()).filter(Boolean);
  const el=document.getElementById("branchDetail");
  el.innerHTML=`
    <div class="branch-hd">
      <div class="ring" style="background:conic-gradient(${col} 0 ${b.score}%,#16221c ${b.score}% 100%)"><i style="color:${col}">${b.score}</i></div>
      <div><div style="font-weight:800;font-size:17px">${b.name}</div>
      <div style="font-size:13px;color:var(--txt-soft)">${b.city||"—"} · <span style="color:${col}">${lv}</span> · ${b.period||""}</div></div>
      <button class="btn btn-mint" style="margin-inline-start:auto" id="anBtn" onclick="analyzeBranch(${b.id})">التحليل التنفيذي</button>
    </div>
    <div class="metrics">
      <div class="m"><div class="ml">المبيعات</div><div class="mv">${fmt(b.sales)}</div></div>
      <div class="m"><div class="ml">صافي الربح</div><div class="mv">${fmt(b.profit)}</div></div>
      <div class="m"><div class="ml">الهامش</div><div class="mv">${b.margin}%</div></div>
      <div class="m"><div class="ml">العملاء</div><div class="mv">${fmt(b.customers)}</div></div>
      <div class="m"><div class="ml">متوسط الفاتورة</div><div class="mv">${fmt(b.avg_invoice)}</div></div>
      <div class="m"><div class="ml">التكرار</div><div class="mv">${b.repeat_rate}%</div></div>
      <div class="m"><div class="ml">النمو</div><div class="mv" style="color:${b.growth>=0?'var(--mint)':'var(--red)'}">${b.growth}%</div></div>
      <div class="m"><div class="ml">تحقيق الهدف</div><div class="mv">${b.target_pct?b.target_pct+"%":"—"}</div></div>
    </div>
    ${prods.length?`<div style="font-size:13px;margin-bottom:12px"><b>الأكثر مبيعاً:</b> <span style="color:var(--txt-soft)">${prods.join(" · ")}</span></div>`:""}
    ${b.history && b.history.length>1?`<div style="height:220px;margin-top:6px"><canvas id="histChart"></canvas></div>`:`<div style="color:var(--txt-mute);font-size:13px">سجّل فترات أكثر لعرض الاتجاه الزمني.</div>`}
    <div class="ai-out" id="aiOut"></div>`;
  if(b.history && b.history.length>1) renderHist(b);
}

function renderHist(b){
  if(histChart) histChart.destroy();
  histChart=new Chart(document.getElementById("histChart"),{
    data:{labels:b.history.map(h=>h.period),
      datasets:[
        {type:"bar",label:"المبيعات",data:b.history.map(h=>h.sales),backgroundColor:"#10b98155",borderRadius:6,yAxisID:"y"},
        {type:"line",label:"المؤشر",data:b.history.map(h=>h.score),borderColor:"#f5b301",borderWidth:2.5,tension:.35,yAxisID:"y1",pointRadius:3}
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#9fb4aa",font:{family:"Tajawal"}}}},
      scales:{x:{ticks:{color:"#678075"},grid:{display:false}},
        y:{position:"right",ticks:{color:"#678075",callback:v=>fmt(v)},grid:{color:"#16221c"}},
        y1:{position:"left",max:100,ticks:{color:"#f5b301"},grid:{display:false}}}}
  });
}

async function analyzeBranch(id){
  const btn=document.getElementById("anBtn"), out=document.getElementById("aiOut");
  btn.disabled=true; btn.textContent="جارٍ التحليل…";
  try{
    const r=await api("/company/analyze",{method:"POST",body:JSON.stringify({scope:"branch",branch_id:id})});
    out.innerHTML=marked.parse(r.analysis||""); out.classList.add("show");
    out.scrollIntoView({behavior:"smooth",block:"nearest"});
  }catch(e){ out.innerHTML=`<p style="color:var(--red)">${e.message}</p>`; out.classList.add("show"); }
  btn.disabled=false; btn.textContent="إعادة التحليل";
}
load();
</script>
</body>
</html>
