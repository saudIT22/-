<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · صلاحيات الفريق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--blue:#3b82f6;--purple:#a855f7;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;transition:.18s}
  .btn-mint{background:var(--mint);color:#04130d;padding:11px 18px}.btn-mint:hover{background:var(--mint-deep)}.btn-mint:disabled{opacity:.6}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 12px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:40px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px}
  .panel h2{font-size:15.5px;font-weight:800;margin-bottom:2px}.panel .sub{font-size:12.5px;color:var(--txt-mute);margin-bottom:14px}
  .member{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
  .member:last-child{border-bottom:none}
  .av{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:17px;flex-shrink:0}
  .mname{font-weight:700;font-size:15px}.memail{font-size:12px;color:var(--txt-mute)}
  .mperms{font-size:12px;color:var(--txt-soft);margin-top:2px}
  .role-tag{font-size:12px;font-weight:800;padding:4px 11px;border-radius:100px;margin-inline-start:auto;white-space:nowrap}
  .rm{background:rgba(239,68,68,.12);color:var(--red);border:none;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:17px;flex-shrink:0}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--txt);font-family:inherit;font-size:14.5px}
  input:focus,select:focus{outline:none;border-color:var(--mint)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
  .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
  .role-card{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px}
  .role-card b{font-size:13.5px}.role-card span{font-size:12.5px;color:var(--txt-soft);display:block}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 40px}
  @media(max-width:520px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>👥 صلاحيات الفريق</h1><p>أضف أعضاء فريقك وحدّد صلاحية كل واحد</p></div>
  <div id="loading" class="state"><div class="spin"></div>جارٍ التحميل…</div>
  <div id="content" style="display:none">
    <div class="panel">
      <h2>أعضاء الفريق</h2>
      <div class="sub" id="teamSub"></div>
      <div id="team"></div>
    </div>
    <div class="panel">
      <h2>＋ إضافة عضو</h2>
      <div class="sub">العضو يُضاف للروستر بصلاحيته — الربط بحساب فعلي يجي لاحقاً</div>
      <div class="err" id="err"></div>
      <div class="row2">
        <div><label>الاسم</label><input id="mname" placeholder="اسم العضو"></div>
        <div><label>الإيميل (اختياري)</label><input id="memail" placeholder="email@example.com"></div>
      </div>
      <div class="row2">
        <div><label>الصلاحية</label><select id="mrole"></select></div>
        <div><label>الفرع (لمدير الفرع)</label><select id="mbranch"><option value="">— غير محدد —</option></select></div>
      </div>
      <button class="btn btn-mint" id="addBtn" onclick="addMember()">إضافة العضو</button>
    </div>
    <div class="panel">
      <h2>دليل الصلاحيات</h2>
      <div id="rolesGuide"></div>
    </div>
  </div>
  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-report.html">التقرير التنفيذي</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
const RC={owner:"var(--mint)",manager:"var(--blue)",accountant:"var(--purple)",staff:"var(--gold)"};
async function api(p,o={}){
  const r=await fetch(p,{...o,headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN,...(o.headers||{})}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة منتهية"); }
  const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||"خطأ"); return d;
}
async function load(){
  let d; try{ d=await api("/company/team"); }
  catch(e){ document.getElementById("loading").innerHTML=`<span style="color:var(--red)">${e.message}</span>`; return; }
  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
  document.getElementById("teamSub").textContent=`${d.company.name} · ${d.team.length} عضو`;

  document.getElementById("team").innerHTML=d.team.map(m=>{
    const col=RC[m.role]||"var(--gold)";
    const initial=(m.name||"؟").trim().charAt(0);
    return `<div class="member">
      <div class="av" style="background:${col}22;color:${col}">${initial}</div>
      <div style="flex:1;min-width:0">
        <div class="mname">${m.name}${m.branch?` · ${m.branch}`:""}</div>
        ${m.email?`<div class="memail">${m.email}</div>`:""}
        <div class="mperms">${m.perms}</div>
      </div>
      <span class="role-tag" style="background:${col}22;color:${col}">${m.role_label}</span>
      ${m.removable?`<button class="rm" onclick="removeMember(${m.id})" title="حذف">×</button>`:""}
    </div>`;
  }).join("");

  document.getElementById("mrole").innerHTML=d.roles.map(r=>`<option value="${r.key}">${r.label}</option>`).join("");
  document.getElementById("mbranch").innerHTML=`<option value="">— غير محدد —</option>`+d.branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
  document.getElementById("rolesGuide").innerHTML=d.roles.map(r=>{
    const col=RC[r.key]||"var(--gold)";
    return `<div class="role-card"><b style="color:${col}">${r.label}</b><span>${r.perms}</span></div>`;
  }).join("");
}
async function addMember(){
  document.getElementById("err").style.display="none";
  const name=document.getElementById("mname").value.trim();
  if(!name){ return showErr("اكتب اسم العضو"); }
  const btn=document.getElementById("addBtn"); btn.disabled=true; btn.textContent="جارٍ الإضافة…";
  try{
    await api("/company/team/add",{method:"POST",body:JSON.stringify({
      name, email:document.getElementById("memail").value.trim(),
      role:document.getElementById("mrole").value,
      branch_id:document.getElementById("mbranch").value||null})});
    document.getElementById("mname").value=""; document.getElementById("memail").value="";
    await load();
  }catch(e){ showErr(e.message); }
  btn.disabled=false; btn.textContent="إضافة العضو";
}
async function removeMember(id){
  if(!confirm("حذف هذا العضو؟")) return;
  try{ await api("/company/team/remove",{method:"POST",body:JSON.stringify({member_id:id})}); await load(); }
  catch(e){ alert(e.message); }
}
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }
load();
</script>
</body>
</html>
