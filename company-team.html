<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه — صلاحيات الفريق</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0c;--surface:#101a14;--card:#141f18;--card-h:#192618;--border:#1e3026;--border-soft:#253c2e;
--mint:#10b981;--mint-b:#34d399;--mint-glow:rgba(16,185,129,.15);--text:#e8f5ee;--text-soft:#8ba89f;--text-dim:#4a6b5a;
--red:#f87171;--red-soft:rgba(248,113,113,.12);--amber:#fbbf24;--blue:#60a5fa;--blue-soft:rgba(96,165,250,.12);
--purple:#a78bfa;--purple-soft:rgba(167,139,250,.12);--sidebar-w:220px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;right:0;top:0;z-index:100}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo .bell{width:38px;height:38px;border-radius:10px;background:var(--mint);display:grid;place-items:center;font-size:20px;box-shadow:0 0 16px var(--mint-glow)}
.sb-logo .brand{font-size:18px;font-weight:900;color:var(--mint)}
.sb-logo .plan{font-size:10px;color:var(--text-dim);margin-top:1px}
.sb-section{padding:16px 12px 6px;font-size:10px;color:var(--text-dim);letter-spacing:.08em}
.sb-nav{list-style:none;padding:0 8px}
.sb-nav li a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--text-soft);font-size:13.5px;font-weight:500;text-decoration:none;transition:all .2s;cursor:pointer}
.sb-nav li a:hover{background:var(--mint-glow);color:var(--mint-b)}
.sb-nav li a.active{background:var(--mint-glow);color:var(--mint-b);font-weight:700}
.sb-nav li a .ic{width:16px;text-align:center;font-size:15px}
.main{margin-right:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:800;flex:1}
.tb-title span{color:var(--text-soft);font-weight:400;font-size:13px;margin-right:8px}
.btn-add{background:var(--mint);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Tajawal';font-weight:800;font-size:13.5px;cursor:pointer}
.btn-add:hover{background:#047857}
.content{padding:24px 28px;flex:1}
.loading{text-align:center;padding:80px;color:var(--text-soft)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--mint);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.intro{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px}
.intro h3{font-size:15px;font-weight:800;margin-bottom:8px}
.intro p{font-size:13px;color:var(--text-soft);line-height:1.8}
.roles-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}
.role-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px}
.r-owner{background:var(--mint-glow);color:var(--mint-b)}
.r-manager{background:var(--blue-soft);color:var(--blue)}
.r-accountant{background:var(--amber-soft,rgba(251,191,36,.12));color:var(--amber)}
.r-staff{background:var(--purple-soft);color:var(--purple)}
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:760px){.team-grid{grid-template-columns:1fr}}
.member{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px}
.member .av{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:20px;font-weight:900;flex-shrink:0}
.av-owner{background:var(--mint-glow);color:var(--mint-b)}
.av-manager{background:var(--blue-soft);color:var(--blue)}
.av-accountant{background:rgba(251,191,36,.12);color:var(--amber)}
.av-staff{background:var(--purple-soft);color:var(--purple)}
.member .info{flex:1;min-width:0}
.member .name{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px}
.member .email{font-size:12px;color:var(--text-soft);margin-top:3px;direction:ltr;text-align:right}
.member .branch{font-size:11.5px;color:var(--text-dim);margin-top:4px}
.member .del{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;flex-shrink:0}
.member .del:hover{border-color:var(--red);color:var(--red)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-soft);border-radius:18px;padding:26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:900;margin-bottom:18px}
.modal label{display:block;font-size:13px;font-weight:700;color:var(--text-soft);margin-bottom:6px;margin-top:14px}
.modal input,.modal select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Tajawal';font-size:14px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--mint)}
.role-select{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.role-opt{padding:10px;border:1.5px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--text-soft);transition:all .2s}
.role-opt.active{border-color:var(--mint);background:var(--mint-glow);color:var(--mint-b)}
.modal-btns{display:flex;gap:10px;margin-top:22px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-family:'Tajawal';font-weight:800;font-size:14px;cursor:pointer;border:none}
.btn-save{background:var(--mint);color:#fff}
.btn-save:hover{background:#047857}
.btn-cancel{background:var(--card);color:var(--text-soft);border:1px solid var(--border)!important}
.msg{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-top:14px;display:none}
.msg.error{background:var(--red-soft);color:var(--red)}
.msg.success{background:var(--mint-glow);color:var(--mint-b)}
.branch-field{display:none}
.branch-field.show{display:block}
@media(max-width:900px){:root{--sidebar-w:60px}.sb-logo .brand,.sb-logo .plan,.sb-nav li a span,.sb-section{display:none}.sb-logo{justify-content:center;padding:18px 0}.sb-nav li a{justify-content:center}.sb-nav li a .ic{font-size:18px}.content{padding:16px}.topbar{padding:12px 16px}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><div class="bell">🔔</div><div><div class="brand">نبّاه</div><div class="plan">باقة الشركات</div></div></div>
  <div class="sb-section">الرئيسية</div>
  <ul class="sb-nav">
    <li><a href="company-dashboard.html"><span class="ic">🏠</span><span>لوحة المدير</span></a></li>
    <li><a href="company-branches.html"><span class="ic">🏪</span><span>مقارنة الفروع</span></a></li>
    <li><a href="company-team.html" class="active"><span class="ic">👥</span><span>الفريق</span></a></li>
  </ul>
  <div class="sb-section">النظام</div>
  <ul class="sb-nav">
    <li><a href="dashboard.html"><span class="ic">↩️</span><span>الوضع الفردي</span></a></li>
    <li><a href="#" onclick="localStorage.clear();location.href='index.html';return false"><span class="ic">🚪</span><span>خروج</span></a></li>
  </ul>
</aside>
<main class="main">
  <div class="topbar">
    <div class="tb-title">صلاحيات الفريق <span id="tb-company">/ ...</span></div>
    <button class="btn-add" onclick="openModal()">＋ إضافة عضو</button>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>جاري التحميل...</div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>➕ إضافة عضو للفريق</h3>
    <label>الاسم</label>
    <input id="m-name" placeholder="اسم العضو">
    <label>البريد الإلكتروني</label>
    <input id="m-email" type="email" placeholder="email@example.com" style="direction:ltr;text-align:right">
    <label>كلمة المرور (6 أحرف على الأقل)</label>
    <input id="m-pass" type="password" placeholder="••••••">
    <label>الدور</label>
    <div class="role-select">
      <div class="role-opt active" data-role="manager" onclick="setRole(this)">🏪 مدير فرع</div>
      <div class="role-opt" data-role="accountant" onclick="setRole(this)">💰 محاسب</div>
      <div class="role-opt" data-role="staff" onclick="setRole(this)">👤 موظف</div>
    </div>
    <div class="branch-field show" id="branch-field">
      <label>الفرع المسؤول عنه</label>
      <select id="m-branch"></select>
    </div>
    <div class="msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn-save" id="save-btn" onclick="addMember()">إضافة</button>
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
if(!localStorage.getItem("nabbah_token")) location.href="login.html";
const token=localStorage.getItem("nabbah_token");
const authH={"Authorization":"Bearer "+token,"Content-Type":"application/json"};
let selectedRole="manager", branchesData=[];

const roleNames={owner:"مالك",manager:"مدير فرع",accountant:"محاسب",staff:"موظف"};
const roleClasses={owner:"owner",manager:"manager",accountant:"accountant",staff:"staff"};

async function load(){
  try{
    const r=await fetch("/company/team",{headers:authH});
    if(r.status===401){localStorage.clear();location.href="login.html";return}
    if(r.status===403){
      const d=await r.json();
      document.getElementById("content").innerHTML=`<div class="intro"><h3>⛔ ${d.detail||"هذه الصفحة للمالك فقط"}</h3><p>صلاحيات الفريق متاحة لمالك الشركة فقط.</p></div>`;
      return;
    }
    const d=await r.json();
    branchesData=d.branches||[];
    render(d);
  }catch(e){document.getElementById("content").innerHTML='<div class="loading">تعذّر التحميل</div>'}
}

function render(d){
  document.getElementById("tb-company").textContent="/ "+(d.company?.name||"");
  let html=`<div class="intro"><h3>👥 إدارة فريق العمل</h3><p>أضف أعضاء فريقك بأدوار وصلاحيات مختلفة. كل دور يرى ما يخصه فقط — المدير العام يرى كل شيء، مدير الفرع يرى فرعه، والمحاسب يرى البيانات المالية.</p>
    <div class="roles-legend">
      <div class="role-chip r-owner">👑 مالك — صلاحية كاملة</div>
      <div class="role-chip r-manager">🏪 مدير فرع — فرعه فقط</div>
      <div class="role-chip r-accountant">💰 محاسب — المال فقط</div>
      <div class="role-chip r-staff">👤 موظف — إدخال فقط</div>
    </div></div>`;

  html+=`<div class="team-grid">`;
  d.team.forEach(m=>{
    const rc=roleClasses[m.role]||"staff";
    const initial=(m.name||"؟").charAt(0);
    html+=`<div class="member">
      <div class="av av-${rc}">${initial}</div>
      <div class="info">
        <div class="name">${m.name} <span class="role-badge r-${rc}">${m.is_owner?"👑 مالك":roleNames[m.role]}</span></div>
        <div class="email">${m.email}</div>
        ${m.assigned_branch?`<div class="branch">🏪 ${m.assigned_branch}</div>`:""}
      </div>
      ${m.is_owner?"":`<button class="del" onclick="removeMember(${m.id},'${m.name}')">✕</button>`}
    </div>`;
  });
  html+=`</div>`;
  document.getElementById("content").innerHTML=html;
}

function openModal(){
  // عبّي قائمة الفروع
  const sel=document.getElementById("m-branch");
  sel.innerHTML=branchesData.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("m-name").value="";
  document.getElementById("m-email").value="";
  document.getElementById("m-pass").value="";
  document.getElementById("modal-msg").style.display="none";
}
function setRole(el){
  document.querySelectorAll(".role-opt").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  selectedRole=el.dataset.role;
  document.getElementById("branch-field").classList.toggle("show",selectedRole==="manager");
}
function showMsg(t,type){const m=document.getElementById("modal-msg");m.textContent=t;m.className="msg "+type;m.style.display="block"}

async function addMember(){
  const name=document.getElementById("m-name").value.trim();
  const email=document.getElementById("m-email").value.trim();
  const password=document.getElementById("m-pass").value.trim();
  const branch_id=document.getElementById("m-branch").value;
  if(!name||!email||!password){showMsg("عبّي كل الحقول","error");return}
  const btn=document.getElementById("save-btn");btn.disabled=true;btn.textContent="...";
  try{
    const r=await fetch("/company/team/add",{method:"POST",headers:authH,body:JSON.stringify({name,email,password,role:selectedRole,branch_id})});
    const d=await r.json();
    if(!r.ok){showMsg(d.detail||"خطأ","error");btn.disabled=false;btn.textContent="إضافة";return}
    showMsg("✅ "+d.message,"success");
    setTimeout(()=>{closeModal();load();btn.disabled=false;btn.textContent="إضافة"},1000);
  }catch(e){showMsg("تعذّر الاتصال","error");btn.disabled=false;btn.textContent="إضافة"}
}

async function removeMember(id,name){
  if(!confirm(`إزالة ${name} من الفريق؟`))return;
  try{
    const r=await fetch("/company/team/remove",{method:"POST",headers:authH,body:JSON.stringify({member_id:id})});
    if(r.ok)load();
    else{const d=await r.json();alert(d.detail||"تعذّرت الإزالة")}
  }catch(e){alert("تعذّر الاتصال")}
}

load();
</script>
</body>
</html>
