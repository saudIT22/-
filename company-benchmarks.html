<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · مقارنة مع القطاع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;text-decoration:none}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 14px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}

  .summary-bar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:13px}
  .summary-bar .ico{font-size:26px}
  .summary-bar .t{font-weight:800;font-size:15px;margin-bottom:2px}
  .summary-bar .s{font-size:13px;color:var(--txt-soft)}

  .cmp{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:11px;border-right:5px solid}
  .cmp-h{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap}
  .cmp-h .ico{font-size:18px}
  .cmp-h .t{font-weight:800;font-size:15px;flex:1}
  .cmp-h .verdict{font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:100px}

  .vs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
  .v-box{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center}
  .v-box .l{font-size:11.5px;color:var(--txt-soft);font-weight:600}
  .v-box .v{font-size:22px;font-weight:900;margin-top:3px;letter-spacing:-.02em}
  .gap{text-align:center;font-size:13px;color:var(--txt-soft);padding:6px;background:var(--panel2);border-radius:8px}
  .note{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--txt-mute);font-size:12.5px;margin-bottom:14px;line-height:1.7}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 40px}
  @media(max-width:560px){.vs{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-command-center.html">مركز القيادة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>📐 مقارنة مع القطاع (Benchmarks)</h1><p>أين تقف شركتك مقابل متوسطات قطاعك؟</p></div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ المقارنة…</div>
  <div id="error" class="state" style="display:none;color:var(--red)"></div>

  <div id="content" style="display:none">
    <div class="summary-bar" id="summary"></div>
    <div class="note" id="footnote"></div>
    <div id="cmps"></div>
  </div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-root-cause.html">🔍 الأسباب الجذرية</a>
    <a class="btn btn-ghost" href="company-health.html">❤️ صحة الشركة</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة"); }
  const d=await r.json().catch(()=>({}));
  const er=new Error(d.detail||"خطأ"); er.status=r.status;
  if(!r.ok) throw er;
  return d;
}
async function load(){
  try{
    const d=await api("/company/benchmarks");
    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";
    document.getElementById("summary").innerHTML=`
      <div class="ico">📊</div>
      <div style="flex:1"><div class="t">${d.company.name} — قطاع ${d.sector}</div>
      <div class="s">${d.summary}</div></div>`;
    document.getElementById("footnote").textContent=d.note;
    document.getElementById("cmps").innerHTML=d.comparisons.map(c=>{
      const sign=c.diff>=0?"+":"";
      const hibSign=c.higher_is_better?"الأعلى أفضل":"الأقل أفضل";
      return `<div class="cmp" style="border-right-color:${c.color}">
        <div class="cmp-h">
          <span class="ico">${c.status}</span>
          <div class="t">${c.label}</div>
          <span class="verdict" style="background:${c.color}22;color:${c.color}">${c.verdict}</span>
        </div>
        <div class="vs">
          <div class="v-box"><div class="l">شركتك</div><div class="v" style="color:${c.color}">${c.actual}</div></div>
          <div class="v-box"><div class="l">متوسط القطاع</div><div class="v" style="color:var(--txt-soft)">${c.benchmark}</div></div>
        </div>
        <div class="gap">الفارق: <b style="color:${c.color}">${sign}${c.diff}</b> · <span style="color:var(--txt-mute)">${hibSign}</span></div>
      </div>`;
    }).join("");
  }catch(e){
    document.getElementById("loading").style.display="none";
    const er=document.getElementById("error"); er.style.display="block";
    if(e.status===402) er.innerHTML=`⏳ شركتك قيد التفعيل. <a href="company-dashboard.html" style="color:var(--mint)">رجوع</a>`;
    else er.textContent=e.message;
  }
}
load();
</script>
</body>
</html>
