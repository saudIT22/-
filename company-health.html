<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · صحة الشركة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;text-decoration:none}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 14px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}

  .gauge-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px;margin-bottom:14px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center}
  .gauge{width:160px;height:160px;border-radius:50%;display:grid;place-items:center;position:relative;flex-shrink:0}
  .gauge::after{content:"";position:absolute;inset:14px;background:var(--panel);border-radius:50%}
  .gauge .v{position:relative;z-index:1;font-size:48px;font-weight:900;letter-spacing:-.04em;line-height:1}
  .gauge .of{font-size:14px;color:var(--txt-mute);font-weight:700}
  .gauge-info{flex:1;min-width:200px}
  .gauge-info .level{font-size:24px;font-weight:900;margin-bottom:4px}
  .gauge-info .stamp{font-size:13px;color:var(--txt-mute);margin-top:8px}
  .cause{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 17px;margin-bottom:14px;display:flex;gap:11px;align-items:flex-start}
  .cause .ico{font-size:24px;flex-shrink:0}
  .cause .t{font-weight:800;font-size:14px}
  .cause .d{font-size:13.5px;color:var(--txt-soft);margin-top:3px;line-height:1.7}

  .axes{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px}
  .axis{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:13px}
  .axis .ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
  .axis .info{flex:1;min-width:0}
  .axis .lbl{font-weight:800;font-size:14.5px}
  .axis .metric{font-size:12.5px;color:var(--txt-soft);margin-top:2px}
  .axis .bar{width:100px;height:7px;background:var(--panel2);border-radius:99px;overflow:hidden;flex-shrink:0;margin-inline:8px}
  .axis .bar-fill{height:100%;border-radius:99px}
  .axis .score{font-size:18px;font-weight:900;width:44px;text-align:left;flex-shrink:0}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 40px}
  @media(max-width:560px){.gauge-card{padding:20px}.axis .bar{display:none}}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-command-center.html">مركز القيادة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>❤️ صحة الشركة</h1><p>مؤشر ٠-١٠٠ شامل لخمسة محاور: الربحية، السيولة، النمو، رضا العملاء، إدارة المخاطر</p></div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ احتساب المؤشّر…</div>
  <div id="error" class="state" style="display:none;color:var(--red)"></div>

  <div id="content" style="display:none">
    <div class="gauge-card">
      <div class="gauge" id="gauge"><span class="v" id="overall">—</span></div>
      <div class="gauge-info">
        <div class="level" id="level">—</div>
        <div style="font-size:13px;color:var(--txt-soft)">مؤشّر الصحة العام لشركتك — مزيج موزون من ٥ محاور</div>
        <div class="stamp" id="stamp"></div>
      </div>
    </div>

    <div class="cause" id="causeBox" style="display:none">
      <span class="ico">🎯</span>
      <div>
        <div class="t" id="weakAxis"></div>
        <div class="d" id="mainCause"></div>
      </div>
    </div>

    <div class="axes" id="axes"></div>
  </div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-command-center.html">🎛️ مركز القيادة</a>
    <a class="btn btn-ghost" href="company-risks.html">⚠️ المخاطر</a>
    <a class="btn btn-ghost" href="company-predictions.html">🔮 التنبؤ</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة"); }
  const d=await r.json().catch(()=>({}));
  const er=new Error(d.detail||"خطأ"); er.status=r.status;
  if(!r.ok) throw er;
  return d;
}

async function load(){
  try{
    const d=await api("/company/health-score");
    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";

    const g=document.getElementById("gauge");
    g.style.background=`conic-gradient(${d.color} 0 ${d.overall}%,#16221c ${d.overall}% 100%)`;
    document.getElementById("overall").textContent=d.overall;
    document.getElementById("overall").style.color=d.color;
    document.getElementById("level").textContent=d.level;
    document.getElementById("level").style.color=d.color;
    document.getElementById("stamp").textContent=`${d.company.name} · ${d.generated_at}`;

    if(d.weakest_axis && d.overall<80){
      document.getElementById("causeBox").style.display="flex";
      document.getElementById("weakAxis").textContent=`الأولوية للتحسين: ${d.weakest_axis}`;
      document.getElementById("mainCause").textContent=d.main_cause;
    }

    document.getElementById("axes").innerHTML=d.axes.map(a=>`
      <div class="axis">
        <div class="ico" style="background:${a.color}22;color:${a.color}">${a.icon}</div>
        <div class="info">
          <div class="lbl">${a.light} ${a.label}</div>
          <div class="metric">${a.metric}</div>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${a.score}%;background:${a.color}"></div></div>
        <div class="score" style="color:${a.color}">${a.score}</div>
      </div>`).join("");
  }catch(e){
    document.getElementById("loading").style.display="none";
    const er=document.getElementById("error"); er.style.display="block";
    if(e.status===402) er.innerHTML=`⏳ شركتك قيد التفعيل. <a href="company-dashboard.html" style="color:var(--mint)">رجوع</a>`;
    else er.textContent=e.message;
  }
}
load();
</script>
</body>
</html>
