<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · الأسباب الجذرية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--purple:#a855f7;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;text-decoration:none}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:24px 0 14px}.page-head h1{font-size:25px;font-weight:900}.page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}

  .summary{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px}
  .summary .h{font-size:14px;color:var(--txt-soft);margin-bottom:4px}
  .summary .v{font-size:17px;font-weight:800;margin-bottom:8px}
  .summary .desc{font-size:14px;color:var(--txt-soft);line-height:1.7}
  .summary .bar-wrap{margin-top:12px}
  .summary .bar-bg{height:9px;background:var(--panel2);border-radius:99px;overflow:hidden}
  .summary .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--mint),var(--gold));transition:width .8s ease}
  .summary .pct-line{font-size:12.5px;color:var(--txt-mute);margin-top:5px;display:flex;justify-content:space-between}

  .cause{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:11px}
  .cause-h{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .rank{width:34px;height:34px;border-radius:11px;background:var(--purple);color:#fff;display:grid;place-items:center;font-weight:900;font-size:15px;flex-shrink:0}
  .cause-title{font-weight:800;font-size:15.5px;flex:1}
  .cause-meta{display:flex;gap:8px;flex-shrink:0}
  .pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:100px;white-space:nowrap}
  .pill.contrib{background:rgba(168,85,247,.15);color:#c4b5fd}
  .pill.conf{background:rgba(16,185,129,.15);color:#6ee7b7}
  .pill.conf.mid{background:rgba(245,179,1,.15);color:#fbbf24}
  .pill.conf.low{background:rgba(239,68,68,.15);color:#fca5a5}
  .evidence{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:10px}
  .evidence .lbl{font-size:11.5px;color:var(--txt-mute);font-weight:700;margin-bottom:6px}
  .evidence ul{margin:0;padding-inline-start:18px;font-size:13.5px;color:var(--txt-soft);line-height:1.85}
  .evidence li{margin-bottom:3px}
  .reco{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:11px;padding:11px 14px;font-size:13.5px;color:#a7f3d0;display:flex;gap:8px}
  .reco .ico{flex-shrink:0}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 40px}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-command-center.html">مركز القيادة</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head"><h1>🔍 الأسباب الجذرية</h1><p>تحليل مرتبط بالأدلة لاكتشاف الأسباب الحقيقية وراء الأداء</p></div>

  <div id="loading" class="state"><div class="spin"></div>جارٍ التحليل…</div>
  <div id="error" class="state" style="display:none;color:var(--red)"></div>

  <div id="content" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="causes"></div>
  </div>

  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-benchmarks.html">📐 مقارنة بالقطاع</a>
    <a class="btn btn-ghost" href="company-branches.html">🔀 مقارنة الفروع</a>
    <a class="btn btn-ghost" href="company-leakage.html">🛡️ كشف التسرّب</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة"); }
  const d=await r.json().catch(()=>({}));
  const er=new Error(d.detail||"خطأ"); er.status=r.status;
  if(!r.ok) throw er;
  return d;
}
async function load(){
  try{
    const d=await api("/company/root-cause");
    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";

    document.getElementById("summary").innerHTML=`
      <div class="h">المؤشّر المُحلَّل</div>
      <div class="v">${d.metric}</div>
      <div class="desc">${d.current_value}</div>
      <div style="margin-top:10px;font-size:14px;color:var(--txt)">${d.summary}</div>
      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${d.total_explained}%"></div></div>
        <div class="pct-line"><span>${d.total_explained}% من السبب مُفسَّر</span><span>${100-d.total_explained}% غير مُفسَّر</span></div>
      </div>`;

    if(!d.causes.length){
      document.getElementById("causes").innerHTML=`<div class="cause" style="text-align:center;padding:30px"><div style="font-size:36px">✅</div>
        <div style="font-weight:800;margin-top:8px;color:var(--mint)">لا توجد أسباب جذرية ظاهرة</div>
        <div style="font-size:13px;color:var(--txt-soft);margin-top:4px">الأداء قريب من المتوقع — استمر بالمتابعة</div></div>`;
      return;
    }

    document.getElementById("causes").innerHTML=d.causes.map((c,i)=>{
      const confCls=c.confidence>=75?"":c.confidence>=55?"mid":"low";
      const confLabel=c.confidence>=75?"عالية":c.confidence>=55?"متوسطة":"منخفضة";
      return `<div class="cause">
        <div class="cause-h">
          <div class="rank">${i+1}</div>
          <div class="cause-title">${c.title}</div>
          <div class="cause-meta">
            <span class="pill contrib">${c.contribution}% من السبب</span>
            <span class="pill conf ${confCls}">ثقة ${confLabel}</span>
          </div>
        </div>
        <div class="evidence">
          <div class="lbl">📋 الأدلّة</div>
          <ul>${c.evidence.map(e=>`<li>${e}</li>`).join("")}</ul>
        </div>
        <div class="reco"><span class="ico">💡</span><span><b>التوصية:</b> ${c.recommendation}</span></div>
      </div>`;
    }).join("");
  }catch(e){
    document.getElementById("loading").style.display="none";
    const er=document.getElementById("error"); er.style.display="block";
    if(e.status===402) er.innerHTML=`⏳ شركتك قيد التفعيل. <a href="company-dashboard.html" style="color:var(--mint)">رجوع</a>`;
    else er.textContent=e.message;
  }
}
load();
</script>
</body>
</html>
