<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · إنشاء شركة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;
    --mint:#10b981;--mint-deep:#0c8f64;--mint-glow:rgba(16,185,129,.18);
    --txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--red:#ef4444;--r:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:640px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;transition:.18s}
  .btn-mint{background:var(--mint);color:#04130d;padding:12px 20px}
  .btn-mint:hover{background:var(--mint-deep)}
  .btn-mint:disabled{opacity:.6;cursor:default}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .page-head{padding:26px 0 14px}
  .page-head h1{font-size:26px;font-weight:900}
  .page-head p{color:var(--txt-soft);font-size:14.5px;margin-top:3px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px}
  label{display:block;font-size:13.5px;font-weight:700;margin-bottom:7px;color:var(--txt)}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--txt);font-family:inherit;font-size:14.5px}
  input:focus,select:focus{outline:none;border-color:var(--mint)}
  .field{margin-bottom:16px}
  .sectors{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
  .sec{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;transition:.15s}
  .sec.active{border-color:var(--mint);background:linear-gradient(160deg,rgba(16,185,129,.12),transparent);color:var(--mint)}
  .branch{display:grid;grid-template-columns:1.3fr 1fr auto;gap:8px;margin-bottom:9px;align-items:center}
  .branch select{padding:11px 10px}
  .rm{background:rgba(239,68,68,.12);color:var(--red);border:none;border-radius:10px;width:40px;height:42px;cursor:pointer;font-size:18px}
  .add-branch{background:transparent;border:1.5px dashed var(--line);color:var(--txt-soft);border-radius:11px;padding:11px;width:100%;cursor:pointer;font-weight:700;font-size:14px;transition:.15s}
  .add-branch:hover{border-color:var(--mint);color:var(--mint)}
  .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:11px 14px;border-radius:11px;font-size:13.5px;margin-bottom:14px;display:none}
  .hint{font-size:12.5px;color:var(--txt-mute);margin-top:6px}
  @media(max-width:520px){ .branch{grid-template-columns:1fr 1fr auto} }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <a class="btn btn-ghost" href="company-dashboard.html">رجوع للوحة</a>
  </div>
</header>

<div class="wrap">
  <div class="page-head">
    <h1>إنشاء شركة جديدة</h1>
    <p>سجّل شركتك وفروعها — وبعدها أدخل بيانات كل فرع ويبدأ التحليل فوراً.</p>
  </div>

  <div class="err" id="err"></div>

  <div class="card">
    <div class="field">
      <label>اسم الشركة</label>
      <input id="cname" placeholder="مثال: مجموعة الذواقة">
    </div>
    <div class="field">
      <label>نشاط الشركة</label>
      <div class="sectors" id="sectors">
        <div class="sec active" data-s="retail">🛍️ تجزئة</div>
        <div class="sec" data-s="fnb">🍽️ مطاعم وكافيهات</div>
        <div class="sec" data-s="services">🧰 خدمات</div>
        <div class="sec" data-s="other">🏢 أخرى</div>
      </div>
    </div>
  </div>

  <div class="card">
    <label style="margin-bottom:12px">الفروع</label>
    <div id="branches"></div>
    <button class="add-branch" onclick="addBranch()">＋ إضافة فرع</button>
    <div class="hint">المدينة تُستخدم لعرض الفرع على الخريطة. تقدر تعدّل/تضيف فروع لاحقاً.</div>
  </div>

  <button class="btn btn-mint" id="submit" style="width:100%;padding:14px" onclick="createCompany()">إنشاء الشركة والبدء</button>
  <div style="height:40px"></div>
</div>

<datalist id="cities">
  <option>الرياض</option><option>جدة</option><option>مكة المكرمة</option><option>المدينة المنورة</option>
  <option>الدمام</option><option>الخبر</option><option>الظهران</option><option>الطائف</option>
  <option>تبوك</option><option>بريدة</option><option>عنيزة</option><option>خميس مشيط</option>
  <option>أبها</option><option>حائل</option><option>نجران</option><option>جازان</option>
  <option>ينبع</option><option>الأحساء</option><option>الهفوف</option><option>القطيف</option>
  <option>عرعر</option><option>سكاكا</option><option>الجبيل</option>
</datalist>

<script>
const TOKEN = localStorage.getItem("nabbah_token") || "";
if(!TOKEN){ window.location.href="login.html"; }
let sector="retail";

document.querySelectorAll(".sec").forEach(el=>el.onclick=()=>{
  document.querySelectorAll(".sec").forEach(x=>x.classList.remove("active"));
  el.classList.add("active"); sector=el.dataset.s;
});

const TYPES = [["standalone","مستقل"],["mall","مول"],["strip","مجمّع تجاري"],["online","أونلاين"],["kiosk","كشك"]];
function addBranch(){
  const c=document.getElementById("branches");
  const div=document.createElement("div"); div.className="branch";
  const opts=TYPES.map(t=>`<option value="${t[0]}">${t[1]}</option>`).join("");
  div.innerHTML=`<input placeholder="اسم الفرع" class="b-name">
    <input placeholder="المدينة" list="cities" class="b-city">
    <select class="b-type">${opts}</select>`;
  c.appendChild(div);
}
// أول فرعين تلقائياً
addBranch(); addBranch();

async function createCompany(){
  const err=document.getElementById("err"); err.style.display="none";
  const name=document.getElementById("cname").value.trim();
  if(!name){ return showErr("اكتب اسم الشركة"); }
  const branches=[];
  document.querySelectorAll("#branches .branch").forEach(row=>{
    const bn=row.querySelector(".b-name").value.trim();
    const city=row.querySelector(".b-city").value.trim();
    const type=row.querySelector(".b-type").value;
    if(bn) branches.push({name:bn,city,type});
  });
  if(!branches.length){ return showErr("أضف فرعاً واحداً على الأقل"); }

  const btn=document.getElementById("submit"); btn.disabled=true; btn.textContent="جارٍ الإنشاء…";
  try{
    const res=await fetch("/company/create",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
      body:JSON.stringify({name,sector,branches})});
    const data=await res.json().catch(()=>({}));
    if(res.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; return; }
    if(!res.ok){ throw new Error(data.detail||"تعذّر الإنشاء"); }
    window.location.href="company-input.html";
  }catch(e){ showErr(e.message); btn.disabled=false; btn.textContent="إنشاء الشركة والبدء"; }
}
function showErr(m){ const err=document.getElementById("err"); err.textContent=m; err.style.display="block"; window.scrollTo({top:0,behavior:"smooth"}); }
</script>
</body>
</html>
