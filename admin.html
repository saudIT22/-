<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--mint:#10b981;--mint-deep:#047857;--mint-darker:#065f46;--mint-soft:#ecfdf5;
    --ink:#0f1d18;--ink-soft:#475a52;--ink-muted:#8ba89f;--bg:#f4f9f7;--line:#e0ece8;
    --red:#ef4444;--red-soft:#fef2f2;--amber:#f59e0b;--amber-soft:#fef3c7;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
  body{background:var(--bg);color:var(--ink);min-height:100vh;padding:20px}
  .wrap{max-width:1200px;margin:0 auto}
  header{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 24px;
    margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .bell{width:38px;height:38px;border-radius:11px;background:var(--mint);display:grid;place-items:center;
    font-size:20px;transform:rotate(-5deg)}
  .logo .name{font-weight:900;font-size:20px;color:var(--mint-darker)}
  .logo .badge{background:var(--mint-soft);color:var(--mint-darker);padding:4px 10px;border-radius:7px;
    font-size:12px;font-weight:700;margin-right:8px}
  .out-btn{background:#fff;border:1.5px solid var(--line);padding:8px 16px;border-radius:10px;
    font-family:'Tajawal';font-weight:700;cursor:pointer;color:var(--ink-soft)}
  .out-btn:hover{border-color:var(--red);color:var(--red)}

  /* صندوق دخول */
  .login-box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:38px 34px;
    max-width:420px;margin:60px auto;box-shadow:0 16px 50px rgba(6,95,70,.08)}
  .login-box h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:8px}
  .login-box p{text-align:center;color:var(--ink-muted);font-size:14px;margin-bottom:24px}
  .login-box input{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;
    padding:13px 15px;font-size:15px;font-family:'Tajawal';margin-bottom:14px}
  .login-box input:focus{outline:none;border-color:var(--mint)}
  .btn-primary{width:100%;padding:14px;background:var(--mint);color:#fff;border:none;border-radius:12px;
    font-family:'Tajawal';font-size:16px;font-weight:800;cursor:pointer}
  .btn-primary:hover{background:var(--mint-deep)}

  /* إحصائيات */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .lbl{color:var(--ink-muted);font-size:13px;font-weight:600;margin-bottom:6px}
  .stat .val{font-size:26px;font-weight:900;color:var(--mint-darker)}

  /* جدول */
  .table-box{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .table-head{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .table-head h3{font-size:17px;font-weight:800}
  .refresh{background:var(--mint-soft);color:var(--mint-darker);border:none;padding:7px 14px;
    border-radius:9px;font-family:'Tajawal';font-weight:700;cursor:pointer;font-size:13px}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:780px}
  th,td{padding:13px 16px;text-align:right;font-size:13.5px;border-bottom:1px solid var(--line)}
  th{background:#fafbfa;color:var(--ink-soft);font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.3px}
  tr:hover td{background:#fafbfa}
  .badge-pill{display:inline-block;padding:3px 9px;border-radius:7px;font-size:12px;font-weight:700}
  .b-active{background:var(--mint-soft);color:var(--mint-darker)}
  .b-inactive{background:var(--red-soft);color:var(--red)}
  .b-trial{background:var(--amber-soft);color:var(--amber)}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .act-btn{padding:6px 11px;border-radius:8px;font-family:'Tajawal';font-weight:700;cursor:pointer;
    border:none;font-size:12.5px}
  .act-on{background:var(--mint);color:#fff}
  .act-on:hover{background:var(--mint-deep)}
  .act-off{background:#fff;border:1.5px solid var(--line);color:var(--red)}
  .act-off:hover{border-color:var(--red)}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-muted)}

  /* مودال التفعيل */
  .modal-back{position:fixed;inset:0;background:rgba(15,29,24,.55);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
  .modal-back.show{display:flex}
  .modal{background:#fff;border-radius:18px;padding:28px;max-width:380px;width:100%}
  .modal h3{margin-bottom:14px;font-size:18px}
  .modal label{display:block;font-weight:700;font-size:14px;margin:12px 0 6px}
  .modal select,.modal input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;
    font-family:'Tajawal';font-size:15px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .modal-actions button{flex:1;padding:12px;border-radius:10px;font-family:'Tajawal';font-weight:800;cursor:pointer;border:none}
  .cancel{background:#fff;border:1.5px solid var(--line) !important;color:var(--ink-soft)}
  .confirm{background:var(--mint);color:#fff}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--mint-darker);color:#fff;
    padding:13px 20px;border-radius:11px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18);
    z-index:10000;display:none}
  .toast.show{display:block}
  .toast.err{background:var(--red)}
</style>
</head>
<body>

<div class="wrap">

  <!-- صندوق تسجيل دخول الإدارة -->
  <div id="login-screen" class="login-box">
    <h2>🔐 لوحة إدارة نبّاه</h2>
    <p>أدخل كلمة المسؤول للدخول</p>
    <input id="admin-key" type="password" placeholder="كلمة المسؤول" autocomplete="off">
    <button class="btn-primary" onclick="loginAdmin()">دخول</button>
  </div>

  <!-- المحتوى الرئيسي بعد الدخول -->
  <div id="main-screen" style="display:none">
    <header>
      <div class="logo">
        <span class="bell">🔔</span>
        <span class="name">نبّاه</span>
        <span class="badge">لوحة الإدارة</span>
      </div>
      <button class="out-btn" onclick="logoutAdmin()">خروج</button>
    </header>

    <div class="stats">
      <div class="stat"><div class="lbl">إجمالي العملاء</div><div class="val" id="s-total">—</div></div>
      <div class="stat"><div class="lbl">مشتركين فعّالين</div><div class="val" id="s-active">—</div></div>
      <div class="stat"><div class="lbl">حسابات تجريبية</div><div class="val" id="s-trial">—</div></div>
      <div class="stat"><div class="lbl">إجمالي التحاليل</div><div class="val" id="s-entries">—</div></div>
    </div>

    <div class="table-box">
      <div class="table-head">
        <h3>قائمة العملاء</h3>
        <button class="refresh" onclick="loadUsers()">🔄 تحديث</button>
      </div>
      <div class="table-scroll">
        <table id="users-tbl">
          <thead>
            <tr>
              <th>الاسم</th>
              <th>البريد</th>
              <th>الجوال</th>
              <th>المنشأة</th>
              <th>الباقة</th>
              <th>الحالة</th>
              <th>التحاليل</th>
              <th>ينتهي</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- مودال التفعيل -->
<div class="modal-back" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>تفعيل اشتراك العميل</h3>
    <div id="m-email" style="color:#475a52;font-size:14px;margin-bottom:8px"></div>
    <label>الباقة</label>
    <select id="m-plan">
      <option value="basic">الأساسية (269 ريال)</option>
      <option value="pro">الاحترافية (699 ريال)</option>
      <option value="executive" selected>التنفيذية (1299 ريال)</option>
    </select>
    <label>المدة (بالأيام)</label>
    <select id="m-days">
      <option value="30" selected>شهر (30 يوم)</option>
      <option value="90">3 شهور (90 يوم)</option>
      <option value="180">6 شهور (180 يوم)</option>
      <option value="365">سنة (365 يوم)</option>
    </select>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">إلغاء</button>
      <button class="confirm" onclick="confirmActivate()">تفعيل</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminKey = sessionStorage.getItem("nabbah_admin_key") || "";
  let currentUserId = null;

  // عند فتح الصفحة، لو في key محفوظ، جرّب الدخول مباشرة
  if (adminKey) {
    showMain();
    loadUsers();
  }

  function showMain() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-screen").style.display = "block";
  }

  function showLogin() {
    document.getElementById("login-screen").style.display = "block";
    document.getElementById("main-screen").style.display = "none";
  }

  async function loginAdmin() {
    const key = document.getElementById("admin-key").value.trim();
    if (!key) { toast("اكتب كلمة المسؤول", true); return; }
    adminKey = key;
    sessionStorage.setItem("nabbah_admin_key", key);
    showMain();
    loadUsers();
  }

  function logoutAdmin() {
    adminKey = "";
    sessionStorage.removeItem("nabbah_admin_key");
    showLogin();
    document.getElementById("admin-key").value = "";
  }

  async function loadUsers() {
    try {
      const res = await fetch("/admin/users", { headers: { "X-Admin-Key": adminKey } });
      if (res.status === 403) {
        toast("كلمة المسؤول غير صحيحة", true);
        logoutAdmin();
        return;
      }
      const users = await res.json();
      renderUsers(users);
      updateStats(users);
    } catch (e) {
      toast("تعذّر الاتصال بالخادم", true);
    }
  }

  function updateStats(users) {
    const total = users.length;
    const active = users.filter(u => u.is_active === 1 && u.plan !== "trial").length;
    const trial = users.filter(u => u.plan === "trial" || u.plan === "trial_used").length;
    const entries = users.reduce((s, u) => s + (u.entries_count || 0), 0);
    document.getElementById("s-total").innerText = total;
    document.getElementById("s-active").innerText = active;
    document.getElementById("s-trial").innerText = trial;
    document.getElementById("s-entries").innerText = entries;
  }

  function renderUsers(users) {
    const body = document.getElementById("users-body");
    if (!users || users.length === 0) {
      body.innerHTML = '<tr><td colspan="9" class="empty">لا يوجد عملاء مسجّلين بعد</td></tr>';
      return;
    }
    const planNames = {
      "": "—", "basic": "أساسية", "pro": "احترافية",
      "executive": "تنفيذية", "trial": "تجربة", "trial_used": "تجربة منتهية"
    };
    body.innerHTML = users.map(u => {
      const statusBadge = u.is_active === 1
        ? (u.plan === "trial" ? '<span class="badge-pill b-trial">تجريبي</span>' : '<span class="badge-pill b-active">مفعّل</span>')
        : '<span class="badge-pill b-inactive">موقوف</span>';
      const endDate = u.subscription_end ? new Date(u.subscription_end).toLocaleDateString("ar-SA") : "—";
      const actionBtn = u.is_active === 1
        ? `<button class="act-btn act-off" onclick="deactivate(${u.id},'${escape(u.email)}')">إيقاف</button>`
        : `<button class="act-btn act-on" onclick="openModal(${u.id},'${escape(u.email)}')">تفعيل</button>`;
      return `<tr>
        <td><b>${escape(u.name)}</b></td>
        <td>${escape(u.email)}</td>
        <td>${escape(u.phone || "—")}</td>
        <td>${escape(u.business_name || "—")}</td>
        <td>${planNames[u.plan] || u.plan || "—"}</td>
        <td>${statusBadge}</td>
        <td style="text-align:center"><b>${u.entries_count}</b></td>
        <td>${endDate}</td>
        <td><div class="actions">${actionBtn}</div></td>
      </tr>`;
    }).join("");
  }

  function escape(s) { return String(s||"").replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":"&#39;"})[c]); }

  function openModal(userId, email) {
    currentUserId = userId;
    document.getElementById("m-email").innerText = email;
    document.getElementById("modal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("show");
    currentUserId = null;
  }

  async function confirmActivate() {
    const plan = document.getElementById("m-plan").value;
    const days = parseInt(document.getElementById("m-days").value);
    try {
      const res = await fetch("/admin/activate-user", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
        body: JSON.stringify({ user_id: currentUserId, plan, days })
      });
      const out = await res.json();
      if (res.ok) { toast(out.message); closeModal(); loadUsers(); }
      else toast(out.detail || "فشل التفعيل", true);
    } catch (e) { toast("خطأ بالاتصال", true); }
  }

  async function deactivate(userId, email) {
    if (!confirm("إيقاف اشتراك " + email + "؟")) return;
    try {
      const res = await fetch("/admin/deactivate-user", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
        body: JSON.stringify({ user_id: userId })
      });
      const out = await res.json();
      if (res.ok) { toast(out.message); loadUsers(); }
      else toast(out.detail || "فشل الإيقاف", true);
    } catch (e) { toast("خطأ بالاتصال", true); }
  }

  function toast(msg, isErr) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.className = "toast show" + (isErr ? " err" : "");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  document.getElementById("admin-key").addEventListener("keydown", e => { if (e.key === "Enter") loginAdmin(); });
</script>
</body>
</html>
