<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه — التقرير التنفيذي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0c;--surface:#101a14;--card:#141f18;--border:#1e3026;--border-soft:#253c2e;
--mint:#10b981;--mint-b:#34d399;--mint-glow:rgba(16,185,129,.15);--text:#e8f5ee;--text-soft:#8ba89f;--text-dim:#4a6b5a;
--red:#f87171;--red-soft:rgba(248,113,113,.12);--amber:#fbbf24;--amber-soft:rgba(251,191,36,.12);--blue:#60a5fa;--sidebar-w:220px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;right:0;top:0;z-index:100}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo .bell{width:38px;height:38px;border-radius:10px;background:var(--mint);display:grid;place-items:center;font-size:20px;box-shadow:0 0 16px var(--mint-glow)}
.sb-logo .brand{font-size:18px;font-weight:900;color:var(--mint)}
.sb-logo .plan{font-size:10px;color:var(--text-dim);margin-top:1px}
.sb-section{padding:16px 12px 6px;font-size:10px;color:var(--text-dim);letter-spacing:.08em}
.sb-nav{list-style:none;padding:0 8px}
.sb-nav li a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--text-soft);font-size:13.5px;font-weight:500;text-decoration:none;transition:all .2s;cursor:pointer}
.sb-nav li a:hover{background:var(--mint-glow);color:var(--mint-b)}
.sb-nav li a.active{background:var(--mint-glow);color:var(--mint-b);font-weight:700}
.sb-nav li a .ic{width:16px;text-align:center;font-size:15px}
.main{margin-right:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:800;flex:1}
.tb-title span{color:var(--text-soft);font-weight:400;font-size:13px;margin-right:8px}
.btn-print{background:var(--mint);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Tajawal';font-weight:800;font-size:13.5px;cursor:pointer}
.btn-print:hover{background:#047857}
.content{padding:24px 28px;flex:1}
.loading{text-align:center;padding:80px;color:var(--text-soft)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--mint);border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* التقرير */
.report{background:#fff;color:#0f1d18;border-radius:14px;padding:40px;max-width:900px;margin:0 auto;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.rep-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:22px;border-bottom:2px solid #10b981;margin-bottom:26px}
.rep-logo{display:flex;align-items:center;gap:10px}
.rep-logo .bell{width:42px;height:42px;border-radius:11px;background:#10b981;display:grid;place-items:center;font-size:22px}
.rep-logo .t .b{font-size:20px;font-weight:900;color:#065f46}
.rep-logo .t .s{font-size:12px;color:#8ba89f}
.rep-meta{text-align:left;font-size:12px;color:#8ba89f}
.rep-meta .big{font-size:15px;font-weight:800;color:#0f1d18}
.rep-title{font-size:24px;font-weight:900;margin-bottom:4px}
.rep-sub{color:#64748b;font-size:14px;margin-bottom:28px}
/* ملخص */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sum-card{background:#f4f9f7;border:1px solid #e0ece8;border-radius:12px;padding:16px}
.sum-card .lbl{font-size:11.5px;color:#64748b;margin-bottom:6px;font-weight:600}
.sum-card .val{font-size:22px;font-weight:900;color:#0f1d18}
.sum-card .val small{font-size:12px;color:#8ba89f}
.sum-card.hl{background:#ecfdf5;border-color:#a7f3d0}
.sum-card.hl .val{color:#065f46}
.health-row{display:flex;gap:10px;margin-bottom:28px}
.health-pill{flex:1;border-radius:10px;padding:14px;text-align:center}
.hp-good{background:#ecfdf5;border:1px solid #a7f3d0}
.hp-warn{background:#fffbeb;border:1px solid #fde68a}
.hp-bad{background:#fef2f2;border:1px solid #fecaca}
.health-pill .n{font-size:24px;font-weight:900}
.health-pill .l{font-size:11.5px;font-weight:600;margin-top:2px}
.hp-good .n{color:#059669}.hp-warn .n{color:#d97706}.hp-bad .n{color:#dc2626}
.hp-good .l{color:#059669}.hp-warn .l{color:#d97706}.hp-bad .l{color:#dc2626}
.sec-title{font-size:17px;font-weight:900;margin:28px 0 14px;padding-right:12px;border-right:4px solid #10b981}
/* قرارات */
.decision{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:14px}
.dec-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:7px;height:fit-content;white-space:nowrap}
.badge-عاجل{background:#fef2f2;color:#dc2626}
.badge-مهم{background:#fffbeb;color:#d97706}
.badge-فرصة{background:#ecfdf5;color:#059669}
.dec-body .dt{font-size:14.5px;font-weight:800;margin-bottom:5px}
.dec-body .dd{font-size:13px;color:#475569;line-height:1.7}
/* جدول الفروع */
.br-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:13px}
.br-table th{background:#f4f9f7;padding:11px 12px;text-align:right;font-weight:800;color:#065f46;border-bottom:2px solid #e0ece8;font-size:12px}
.br-table td{padding:11px 12px;border-bottom:1px solid #f1f5f4}
.br-table tr:last-child td{border-bottom:none}
.rank-cell{font-weight:900;color:#10b981}
.trend-up{color:#059669;font-weight:700}
.trend-down{color:#dc2626;font-weight:700}
.trend-stable{color:#94a3b8}
.health-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:5px}
.rep-footer{margin-top:30px;padding-top:18px;border-top:1px solid #e2e8f0;text-align:center;font-size:11.5px;color:#94a3b8}
@media print{
  body{background:#fff}.sidebar,.topbar{display:none!important}.main{margin:0}.content{padding:0}
  .report{box-shadow:none;border-radius:0;max-width:100%;padding:20px}
}
@media(max-width:900px){:root{--sidebar-w:60px}.sb-logo .brand,.sb-logo .plan,.sb-nav li a span,.sb-section{display:none}.sb-logo{justify-content:center;padding:18px 0}.sb-nav li a{justify-content:center}.sb-nav li a .ic{font-size:18px}.content{padding:12px}.report{padding:22px}.sum-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:12px 16px}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><div class="bell">🔔</div><div><div class="brand">نبّاه</div><div class="plan">باقة الشركات</div></div></div>
  <div class="sb-section">الرئيسية</div>
  <ul class="sb-nav">
    <li><a href="company-dashboard.html"><span class="ic">🏠</span><span>لوحة المدير</span></a></li>
    <li><a href="company-branches.html"><span class="ic">🏪</span><span>مقارنة الفروع</span></a></li>
    <li><a href="company-team.html"><span class="ic">👥</span><span>الفريق</span></a></li>
    <li><a href="company-report.html" class="active"><span class="ic">📊</span><span>التقرير التنفيذي</span></a></li>
  </ul>
  <div class="sb-section">النظام</div>
  <ul class="sb-nav">
    <li><a href="dashboard.html"><span class="ic">↩️</span><span>الوضع الفردي</span></a></li>
    <li><a href="#" onclick="localStorage.clear();location.href='index.html';return false"><span class="ic">🚪</span><span>خروج</span></a></li>
  </ul>
</aside>
<main class="main">
  <div class="topbar">
    <div class="tb-title">التقرير التنفيذي <span id="tb-company">/ ...</span></div>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>جاري توليد التقرير...</div>
  </div>
</main>

<script>
if(!localStorage.getItem("nabbah_token")) location.href="login.html";
const token=localStorage.getItem("nabbah_token");
const authH={"Authorization":"Bearer "+token};
function fmt(n){return Number(Math.round(n||0)).toLocaleString("en-US")}

async function load(){
  try{
    const r=await fetch("/company/report",{headers:authH});
    if(r.status===401){localStorage.clear();location.href="login.html";return}
    if(r.status===403){location.href="company-register.html";return}
    const d=await r.json();
    document.getElementById("tb-company").textContent="/ "+(d.company?.name||"");
    if(d.empty){
      document.getElementById("content").innerHTML='<div class="loading"><div style="font-size:40px;margin-bottom:12px">📊</div><h3 style="color:#e8f5ee;margin-bottom:8px">لا توجد بيانات بعد</h3><p>أدخل تحاليل بأسماء فروعك أولاً.</p></div>';
      return;
    }
    render(d);
  }catch(e){document.getElementById("content").innerHTML='<div class="loading">تعذّر التحميل</div>'}
}

function render(d){
  const s=d.summary;
  const sectorName={restaurant:"مطاعم",cafe:"كافيهات",retail:"تجزئة"}[d.company.sector]||"";
  let html=`<div class="report">
    <div class="rep-header">
      <div class="rep-logo"><div class="bell">🔔</div><div class="t"><div class="b">نبّاه</div><div class="s">منصة ذكاء القرارات</div></div></div>
      <div class="rep-meta"><div class="big">${d.company.name}</div><div>قطاع ${sectorName}</div><div>${d.generated_at}</div></div>
    </div>
    <div class="rep-title">التقرير التنفيذي الشامل</div>
    <div class="rep-sub">ملخص أداء ${s.branch_count} فرع — مولّد تلقائياً من بيانات نبّاه</div>

    <div class="sec-title">الملخص التنفيذي</div>
    <div class="sum-grid">
      <div class="sum-card hl"><div class="lbl">إجمالي الإيرادات</div><div class="val">${fmt(s.total_revenue)} <small>ر.س</small></div></div>
      <div class="sum-card hl"><div class="lbl">صافي الربح</div><div class="val">${fmt(s.total_profit)} <small>ر.س</small></div></div>
      <div class="sum-card"><div class="lbl">إجمالي الطلبات</div><div class="val">${fmt(s.total_orders)}</div></div>
      <div class="sum-card"><div class="lbl">متوسط الهامش</div><div class="val">${s.avg_margin}<small>٪</small></div></div>
      <div class="sum-card"><div class="lbl">صحة الشركة</div><div class="val">${s.company_health}<small>/100</small></div></div>
      <div class="sum-card"><div class="lbl">عدد الفروع</div><div class="val">${s.branch_count}</div></div>
      <div class="sum-card"><div class="lbl">أفضل فرع</div><div class="val" style="font-size:15px">${s.best_branch}</div></div>
      <div class="sum-card"><div class="lbl">يحتاج انتباه</div><div class="val" style="font-size:15px">${s.worst_branch}</div></div>
    </div>

    <div class="health-row">
      <div class="health-pill hp-good"><div class="n">${s.excellent}</div><div class="l">فروع ممتازة 🟢</div></div>
      <div class="health-pill hp-warn"><div class="n">${s.warning}</div><div class="l">تحتاج متابعة 🟡</div></div>
      <div class="health-pill hp-bad"><div class="n">${s.critical}</div><div class="l">حرجة 🔴</div></div>
    </div>`;

  // القرارات
  if(d.key_decisions&&d.key_decisions.length){
    html+=`<div class="sec-title">أهم القرارات التنفيذية</div>`;
    d.key_decisions.forEach(dec=>{
      html+=`<div class="decision"><div class="dec-badge badge-${dec.priority}">${dec.priority}</div><div class="dec-body"><div class="dt">${dec.title}</div><div class="dd">${dec.detail}</div></div></div>`;
    });
  }

  // جدول الفروع
  html+=`<div class="sec-title">تفصيل الفروع</div>
    <table class="br-table">
      <tr><th>#</th><th>الفرع</th><th>الإيرادات</th><th>الربح</th><th>الهامش</th><th>الطلبات</th><th>الصحة</th><th>الاتجاه</th></tr>`;
  d.branches.forEach((b,i)=>{
    const col=b.health_score>=70?"#10b981":b.health_score>=45?"#fbbf24":"#f87171";
    const tr=b.trend==="up"?'<span class="trend-up">▲ صاعد</span>':b.trend==="down"?'<span class="trend-down">▼ هابط</span>':'<span class="trend-stable">— ثابت</span>';
    html+=`<tr>
      <td class="rank-cell">${i+1}</td>
      <td style="font-weight:700">${b.name}</td>
      <td>${fmt(b.revenue)}</td>
      <td>${fmt(b.profit)}</td>
      <td>${b.margin}٪</td>
      <td>${fmt(b.orders)}</td>
      <td><span class="health-dot" style="background:${col}"></span>${b.health_score}</td>
      <td>${tr}</td>
    </tr>`;
  });
  html+=`</table>
    <div class="rep-footer">تم توليد هذا التقرير تلقائياً بواسطة نبّاه — منصة ذكاء القرارات · ${d.generated_at}</div>
  </div>`;

  document.getElementById("content").innerHTML=html;
}
load();
</script>
</body>
</html>
