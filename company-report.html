<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نبّاه · التقرير التنفيذي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0c;--panel:#101a15;--panel2:#0e1712;--line:#1d2c24;--mint:#10b981;--mint-deep:#0c8f64;--gold:#f5b301;--orange:#f59e0b;--red:#ef4444;--txt:#e8f1ec;--txt-soft:#9fb4aa;--txt-mute:#678075;--r:16px;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background:radial-gradient(circle at 1px 1px,rgba(16,185,129,.05) 1px,transparent 0);background-size:26px 26px}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:40;background:rgba(10,15,12,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .head-in{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px;color:#fff}
  .brand .bell{width:36px;height:36px;border-radius:11px;background:var(--mint);display:grid;place-items:center;font-size:17px;transform:rotate(-5deg)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;font-size:14px;transition:.18s}
  .btn-mint{background:var(--mint);color:#04130d;padding:11px 18px}.btn-mint:hover{background:var(--mint-deep)}
  .btn-ghost{background:var(--panel);color:var(--txt-soft);padding:10px 15px;border:1px solid var(--line)}
  .state{padding:50px 20px;text-align:center;color:var(--txt-soft)}
  .spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--mint);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}@keyframes sp{to{transform:rotate(360deg)}}
  .report{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:26px;margin-bottom:16px}
  .rep-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--mint);padding-bottom:16px;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .rep-head .ttl{font-size:23px;font-weight:900}
  .rep-head .meta{font-size:12.5px;color:var(--txt-mute);text-align:left}
  .rep-logo{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--mint)}
  .sec-h{font-size:15px;font-weight:800;margin:20px 0 12px;color:var(--mint);display:flex;align-items:center;gap:7px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
  .box{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
  .box .l{font-size:11.5px;color:var(--txt-soft)}.box .v{font-size:19px;font-weight:900;margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px}
  th{text-align:right;font-weight:800;color:var(--txt-soft);padding:9px 8px;border-bottom:1px solid var(--line);font-size:12.5px}
  td{padding:10px 8px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .lvl{font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:100px}
  .dec{display:flex;gap:11px;padding:13px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;margin-bottom:9px;align-items:flex-start}
  .dec .pr{font-size:11px;font-weight:800;padding:3px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}
  .dec .dt{font-weight:700;font-size:14px}.dec .dd{font-size:13px;color:var(--txt-soft)}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 40px}
  @media(max-width:600px){.grid4{grid-template-columns:repeat(2,1fr)}}
  @media print{ header,.links,.no-print{display:none!important} body{background:#fff;color:#000} body::before{display:none} .report{border:none;background:#fff} .wrap{max-width:100%} }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <a class="brand" href="company-dashboard.html"><span class="bell">🔔</span>نبّاه</a>
    <div style="display:flex;gap:8px">
      <button class="btn btn-mint no-print" onclick="window.print()">🖨️ طباعة / PDF</button>
      <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    </div>
  </div>
</header>
<div class="wrap">
  <div id="loading" class="state"><div class="spin"></div>جارٍ إعداد التقرير…</div>
  <div id="report" class="report" style="display:none"></div>
  <div class="links">
    <a class="btn btn-ghost" href="company-dashboard.html">اللوحة</a>
    <a class="btn btn-ghost" href="company-team.html">صلاحيات الفريق</a>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("nabbah_token")||"";
if(!TOKEN){ window.location.href="login.html"; }
async function api(p){
  const r=await fetch(p,{headers:{"Authorization":"Bearer "+TOKEN}});
  if(r.status===401){ localStorage.removeItem("nabbah_token"); window.location.href="login.html"; throw new Error("جلسة منتهية"); }
  const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||"خطأ"); return d;
}
const fmt=n=>(Math.round(n)||0).toLocaleString("en-US");
function levelColor(l){ return {"ممتاز":"#10b981","جيد":"#f5b301","متوسط":"#f59e0b","ضعيف":"#ef4444"}[l]||"#94a3b8"; }
function prColor(p){ return {"عاجل":"#ef4444","مهم":"#f59e0b","فرصة":"#10b981"}[p]||"#94a3b8"; }

async function load(){
  let d; try{ d=await api("/company/report"); }
  catch(e){ document.getElementById("loading").innerHTML=`<span style="color:var(--red)">${e.message}</span>`; return; }
  document.getElementById("loading").style.display="none";
  const rep=document.getElementById("report"); rep.style.display="block";

  if(d.empty){
    rep.innerHTML=`<div style="text-align:center;padding:30px"><div style="font-size:40px;margin-bottom:10px">📋</div>
      <div style="font-weight:800;font-size:18px;margin-bottom:6px">لا توجد بيانات بعد</div>
      <div style="color:var(--txt-soft)">أدخل بيانات الفروع أولاً ليتولّد التقرير.</div>
      <a class="btn btn-mint" style="margin-top:16px" href="company-input.html">إدخال البيانات</a></div>`;
    return;
  }
  const s=d.summary;
  rep.innerHTML=`
    <div class="rep-head">
      <div><div class="ttl">التقرير التنفيذي</div>
        <div style="color:var(--txt-soft);font-size:14px">${d.company.name} · ${d.company.sector}</div></div>
      <div><div class="rep-logo"><span>🔔</span>نبّاه</div><div class="meta">${d.generated_at}</div></div>
    </div>

    <div class="sec-h">⚡ الملخص التنفيذي</div>
    <div class="grid4">
      <div class="box"><div class="l">إجمالي المبيعات</div><div class="v">${fmt(s.total_sales)}<span style="font-size:12px"> ر</span></div></div>
      <div class="box"><div class="l">صافي الربح</div><div class="v">${fmt(s.total_profit)}<span style="font-size:12px"> ر</span></div></div>
      <div class="box"><div class="l">هامش الربح</div><div class="v">${s.avg_margin}%</div></div>
      <div class="box"><div class="l">مؤشر الأداء</div><div class="v">${s.overall_score}<span style="font-size:12px">/100</span></div></div>
    </div>
    <div style="display:flex;gap:18px;margin-top:13px;font-size:13.5px;color:var(--txt-soft);flex-wrap:wrap">
      <span>عدد الفروع: <b style="color:var(--txt)">${s.branch_count}</b></span>
      <span>إجمالي العملاء: <b style="color:var(--txt)">${fmt(s.total_customers)}</b></span>
      <span>أفضل فرع: <b style="color:var(--mint)">${s.best_branch}</b></span>
      <span>أضعف فرع: <b style="color:var(--red)">${s.worst_branch}</b></span>
    </div>

    <div class="sec-h">🏆 أداء الفروع</div>
    <table>
      <thead><tr><th>الفرع</th><th>المدينة</th><th>المبيعات</th><th>العملاء</th><th>الهامش</th><th>النمو</th><th>المؤشر</th></tr></thead>
      <tbody>${d.branches.map(b=>`<tr>
        <td style="font-weight:700">${b.name}</td><td style="color:var(--txt-mute)">${b.city||"—"}</td>
        <td>${fmt(b.sales)}</td><td>${fmt(b.customers)}</td><td>${b.margin}%</td>
        <td style="color:${b.growth>=0?'var(--mint)':'var(--red)'}">${b.growth}%</td>
        <td><span class="lvl" style="background:${levelColor(b.level)}22;color:${levelColor(b.level)}">${b.score} · ${b.level}</span></td>
      </tr>`).join("")}</tbody>
    </table>

    ${d.key_decisions && d.key_decisions.length?`
    <div class="sec-h">✅ القرارات التنفيذية الموصى بها</div>
    ${d.key_decisions.map(k=>`<div class="dec">
      <span class="pr" style="background:${prColor(k.priority)}22;color:${prColor(k.priority)}">${k.priority}</span>
      <div><div class="dt">${k.title}</div><div class="dd">${k.detail}</div></div></div>`).join("")}`:""}

    <div style="margin-top:24px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--txt-mute);text-align:center">
      تقرير مُولّد آلياً بواسطة منصة نبّاه · ${d.generated_at}
    </div>`;
}
load();
</script>
</body>
</html>
